      --bg-secondary  : #1a1111;
      --bg-card       : #221717;
      --text-primary  : #f0e8e8;
      --text-secondary: #b8a0a0;

      --border-light  : #241515;
      --shadow        : rgba(225, 29, 72, 0.25);
      --brand-github  : #c0c0c0;
      --brand-twitter : #aaaaaa;
      --brand-threads : #aaaaaa;
      --toast-bg       : rgba(10, 6, 6, 0.88);
      --toast-text     : #f0e8e8;
      --toast-border   : rgba(225, 29, 72, 0.2);
    }

    /* Base Styles — Reset & Global */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    html { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    ::selection { background: var(--accent); color: #ffffff; }
    .ambient-glow {
      position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none; z-index: 0;

      width: 100%; height: 100%;

      text-decoration: none; transition: top 250ms ease;

    .skip-link:focus { top: 0; outline: 2px solid #ffffff; outline-offset: 2px; }
    noscript {
